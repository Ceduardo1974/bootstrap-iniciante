<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap</title>

    <!--boostrap-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <h1 class="text-primary text-center">Aprendendo Bootstrap</h1>
    
    <!-- Container // linhas // Colunas //Breakpoint-->

    <div class="container" style="border:1px solid red;"> 
        <div class="row">

            <div class= "col-md-3 col-sm-6" style="border:1px solid black;">
                Coluna 1
            </div>

            <div class="col-md-3 col-sm-3 " style="border: 1px solid black; ">
                Coluna 2
            </div>

            <div class="col-md-6 col-sm-3"  style="border: 1px solid black; ">
                Coluna 3
            </div>
            
        </div>
    </div>
    <!--Botão-->
    <div class="container">
        <div class="row">
            <div class="col">
                <button class="btn btn-primary">Salvar</button>
            </div>
            <div class="col">
                <button class="btn btn-success">Confirmar</button>
            </div>
            <div class="col">
                <button class="btn btn-danger">Deletar</button>
            </div>
        </div>
    </div>

    <!--Card-->
    <div class="container">
        <div class="row">
            <div class="col">
                <article class="card h-100">
                    <img src="https://newr7-r7-prod.web.arc-cdn.net/resizer/v2/C6RYVXB7LNF2FIIJ4IKAASJ4MM.png?auth=17ee78eb32b6263d4045b88f948716fdaea54dd1f39abb33e35eb83f5a51c30b&width=1600&height=900" alt="Menino Ney em campo" class="card-img-top">
                    <div class="card-body">
                        <h5 class="card-title text-center">Neymar Junior</h5>
                    </div>
                    <ul class="list-group list-group-flush">
                    <li class="list-group-item text-body-secondary">Clube: Santos</li>
                    <li class="list-group-item text-body-secondary">Idade: 36</li>
                    </ul>

                </article>
            </div>
            <div class="col">
                <article class="card h-100">
                    <img src=https://lncimg.lance.com.br/cdn-cgi/image/width=950,quality=75,fit=pad,format=webp/uploads/2026/02/Lionel-Messi-Inter-Miami-2-aspect-ratio-512-320.jpg alt="Messi" class="card-img-top">
                    <div class="card-body">
                        <h5 class="card-title text-center">Leonel Messi</h5>
                    </div>
                    <ul class="list-group list-group-flush">
                    <li class="list-group-item text-body-secondary">Clube: Inter Miami</li>
                    <li class="list-group-item text-body-secondary">Idade: 37</li>
                    </ul>

                </article>
            </div>
            <div class="col">
                <article class="card h-100">
                    <img src="https://portalhortolandia.com.br/wp-content/uploads/2026/02/cr7-alnassr-1024x628.jpg" alt="Cristiano Ronaldo" class="card-img-top">
                    <div class="card-body">
                        <h5 class="card-title text-center">Cristiano Ronaldo</h5>
                    </div>
                    <ul class="list-group list-group-flush">
                    <li class="list-group-item text-body-secondary">Clube: Al Nasr</li>
                    <li class="list-group-item text-body-secondary">Idade: 40</li>
                    </ul>

                </article>
                
            </div>
        </div>
    </div>

    <!--NavBar-->
    <nav class="navbar bg-body-secondary navbar-expand-sm">
        <div class="container">
        <ul class="navbar-nav">

            <li class="nav-item">
                <a href="nav-item" class="nav-link">Campeonatos</a>
            </li>

            <li>
                <a href="nav-item" class="nav-link">Jogadores</a>
            </li>

            <li>
                <a href="nav-item" class="nav-link">Clubes</a>
            </li>
        </ul>
    </div>
</nav>

    <!--Form-->
    <form class="container">
        <div class="mb-3">
           <label for="nome" class="form-label">Nome:</label>
           <input type="Text" class="form-control">
        </div>

        <div class="mb-3">
           <label for="nome" class="form-label">Email:</label>
           <input type="email" class="form-control">
        </div>

        <!--sexo-->
        <div class="form-check">
           <input class="form-check-input" type="radio" name="sexo">
           <label class="form-check-label" for="masculino">
                  Masculino
        </label>
        </div>

        <div class="form-check">
          <input class="form-check-input" type="radio" name="sexo">
          <label class="form-check-label" for="feminino">
                 feminino
        </label>
        </div>

        <!--senha-->
        <div class="row g-3 align-items-center">
        <div class="col-auto">
        <label for="senha" class="col-form-label">senha</label>
        </div>

      <div class="col-auto">
      <input type="password" class="form-control">
      </div>

      <div class="col-auto">
      <span class="form-text">
          Sua senha deve conter no minimo de 8 a 20 caracteres
    </span>
  </div>
</div>

        <!--Botao de confirmar-->
        <button class="btn btn-primary">Enviar</button>

    </form>
</body>
</html>
